name: MTA Alerts to Discord

# 触发器配置
on:
  schedule:
    # 每 10 分钟运行一次。MTA 服务通告通常不需要秒级延迟。
    - cron: '*/10 * * * *'
  workflow_dispatch: # 允许你在 GitHub 网页端点击按钮手动测试运行

jobs:
  run-bot:
    runs-on: ubuntu-latest
    # 赋予工作流写入权限，以便能把状态文件(seen_alerts.json)提交回仓库
    permissions:
      contents: write 
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch Alerts and Notify Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python mta_alerts.py

      - name: Commit State File
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update MTA alerts state [skip ci]"
          file_pattern: 'seen_alerts.json'
