name: MTA Alerts Monitor

on:
  schedule:
    - cron: '*/15 * * * *'  # 每 15 分钟运行一次
  workflow_dispatch:        # 支持手动点击运行

jobs:
  check-alerts:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 保障写入 seen_alerts.json 的权限

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # 核心优化：缓存 pip 依赖包，大幅加快 Actions 运行速度

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Fetch Alerts and Notify Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python mta_alerts.py

      - name: Commit State File
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update MTA alerts state [skip ci]"
          file_pattern: 'seen_alerts.json'
