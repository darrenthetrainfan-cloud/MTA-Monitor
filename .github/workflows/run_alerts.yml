name: MTA Alerts Monitor

on:
  schedule:
    - cron: '*/15 * * * *'  # 15分钟一次，适合长期平稳运行
  workflow_dispatch:

jobs:
  check-alerts:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必须开启写入权限

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install
        run: pip install -r requirements.txt

      - name: Run Script
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python mta_alerts.py

      - name: Save State
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update seen alerts [skip ci]"
          file_pattern: 'seen_alerts.json'
